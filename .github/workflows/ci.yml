name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Static checks
        run: ruff check .
      - name: Tests
        run: pytest -q
      - name: Demo benchmark
        run: python bench.py run --config examples/demo_config.yaml --output runs/ci --demo
      - name: Upload demo report
        uses: actions/upload-artifact@v4
        with:
          name: demo-report
          path: runs/ci

